<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
        }

        thead {
            background-color: lightblue;
        }

        th {
            padding:5px;
        }

        td {
            padding-top: 2px;
            padding-left: 4px;
        }

        tr:hover {
            background-color: lightgray;
        }

    </style>
</head>
<body>
    <h1>HTML Tablolar</h1>

    <table>
        <thead>
            <tr>
                <th>İsim</th>
                <th>Soyisim</th>
                <th>Doğum Tarihi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ali </td>
                <td>Congul</td>
                <td style="text-align: center;">1980</td>
            </tr>
            <tr>
                <td>Mehmet</td>
                <td>Kurt</td>
                <td style="text-align: center;">2001</td>
            </tr>
            <tr>
                <td>Fatma</td>
                <td>Paraş</td>
                <td style="text-align: center;">2005</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
