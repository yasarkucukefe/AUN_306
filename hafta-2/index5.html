<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .sehir {
            border:1px solid blue;
            padding: 10px;
            margin:10px;
            background-color: bisque;
        }

        .sehirler {
            border:1px dashed darkgray;
            padding:10px;
        }

        .baslik {
            font-size: 20px;
        }

        .sehir p{
            color:brown
        }

    </style>
</head>
<body>
    <h1>Div Elementi ve Class</h1>

    <p class="baslik">
        Türkiye'nin şehirleri
    </p>
    <div class="sehirler">
        <div class="sehir">
            <h2>Ankara</h2>
            <p>Ankara Türkiye'nin başkentidir.</p>
        </div>
        
        <div class="sehir">
            <h2>İstanbul</h2>
            <p>İstanbul Türkiye'nin en büyük şehridir.</p>
        </div>

        <div class="sehir">
            <h2>İzmir</h2>
            <p>İzmir Türkiye'nin üçüncü büyük şehridir.</p>
        </div>
    </div>
    
    
</body>
</html>
