<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Listeler</h1>

    <p>Sıralı liste (ordered list)</p>

    <ol>
        <li>Nissan</li>
        <li>Togg</li>
        <li>Tesla</li>
    </ol>

    <ol type="A">
        <li>Nissan</li>
        <li>Togg</li>
        <li>Tesla</li>
    </ol>

    <ol type="a">
        <li>Nissan</li>
        <li>Togg</li>
        <li>Tesla</li>
    </ol>

    <p>Sırasız liste (unordered list)</p>
    <ul>
        <li>Elma</li>
        <li>Portakal</li>
        <li>Muz</li>
    </ul>

    <p>List-style-type</p>
    <ul style="list-style-type: circle;">
        <li>Elma</li>
        <li>Portakal</li>
        <li>Muz</li>
    </ul>

    <p>List-style-type</p>
    <ul style="list-style-type: none;">
        <li>Elma</li>
        <li>Portakal</li>
        <li>Muz</li>
    </ul>

</body>
</html>
