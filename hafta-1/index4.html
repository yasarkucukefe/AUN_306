<!DOCTYPE html>
<html>
    <head>

        <!-- Internal CSS -->
        <style>
            h3 {
                color: green;
                font-size: 10px;
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-style: italic;
            }
        </style>

        <!-- External CSS -->
        <link rel = "stylesheet" href="ders1.css">

    </head>

    <body>

        <h1>CSS</h1>
        <h4>Cascading Style Sheets</h4>
        <ul>
            <li>Inline (element içinde CSS)</li>
            <li>Internal (html dosya içinde CSS)</li>
            <li>External (Harici CSS dosya)</li>
        </ul>

        <!-- Inline CSS -->
        <h2 style="color:blue">Haftanın Günleri (Türkçe)</h2>
        
        <h3>Pazartesi</h3>
        <h3>Salı</h3>
        <h3>Çarşambar</h3>
        <h3>Perşembe</h3>
        <h3>Cuma</h3>
        <h3>Cumartesi</h3>
        <h3>Pazar</h3>

        <h5> External CSS elementi</h5>



    </body>

</html>
