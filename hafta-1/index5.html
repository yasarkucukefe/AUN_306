<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programlama II</title>

    <style>
        a {
            text-decoration: none; 
            color: blue;
        }
    </style>
</head>
<body>
    <h4>Web Programlama</h4>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h5>
        HTML Linkleri
    </h5>
    
    <ul>
        <li><a href="https://google.com">Google</a></li>
        <li><a href="https://linkedin.com">LinkedIn</a></li>
        <li><a href="https://instagram.com">Instagram</a></li>
    </ul>

    <p>Bir linke tıklandığında link adresi aynı sayfada açılır. (Varsayılan olarak)</p>
    <p> target = "_blank" yeni sekmede açar</p>
    <p> target = "_self" aynı sekmede açar</p>

    <ul>
        <li><a target="_blank" href="https://google.com">Google</a></li>
        <li><a target="_blank" href="https://linkedin.com">LinkedIn</a></li>
        <li><a target="_blank" href="https://instagram.com">Instagram</a></li>
    </ul>

</body>
</html>
