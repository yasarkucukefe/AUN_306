<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haft-5 JS</title>
</head>
<body>
    <h1>Javascript</h1>

    <u>
        <li>HTML: Sayfa yapısını oluşturur</li>
        <li>CSS: Sayfanın görünümünü ve stilini belirler</li>
        <li>JS: Sayfanın işlevselliğini sağlar (etkileşimli davranışlar)</li>
    </u>

    <div style="padding: 10px;">
        <!-- Butona tıklandığında (onlick) fonksiyon: baslikDegistir() çalıştır.-->
        <button id="btnYeni">Başlığı Değiştir</button>
    </div>


    <script>
        // JavaScript Kodu...
        const baslikElm = document.querySelector("h1");
        baslikElm.innerText = "YBS306-Programlama II";

        // JS Fonksiyonu:
        function baslikDegistir(){
            const yeniBaslik = prompt("Yeni Başlık:");
            if(yeniBaslik != null){
                baslikElm.innerText = yeniBaslik;
            }
        }

        // Buton Elementini Seçelim:
        const btnYeni = document.querySelector("#btnYeni"); // seç element id:btnYeni
        // Alternatif seçim: document.getElementById
        // const btnYeni = document.getElementById("btnYeni");

        // Ekle click event listener
        btnYeni.addEventListener("click", baslikDegistir);



    </script>
    
</body>
</html>
